name: Publish multi-arch manifest

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag without arch suffix (e.g. 4.5.2)
        required: true

env:
  IMAGE_NAME: mattocci/cmdstan-ai

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish manifest without pulling layers
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag }}"
          docker buildx imagetools create \
            -t "${IMAGE_NAME}:${TAG}" \
            "docker.io/${IMAGE_NAME}:${TAG}_amd64" \
            "docker.io/${IMAGE_NAME}:${TAG}_arm64"

      - name: Inspect published manifest
        run: docker buildx imagetools inspect "${IMAGE_NAME}:${{ github.event.inputs.tag }}"
